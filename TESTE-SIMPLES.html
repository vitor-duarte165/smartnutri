<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste SmartNutri</title>
</head>
<body>
    <h1>Teste de Carregamento</h1>
    <div id="teste">
        <p>Se você está vendo isso, o HTML está funcionando!</p>
        <p>Agora vamos testar o JavaScript...</p>
    </div>
    <script>
        console.log('✅ JavaScript está funcionando!');
        console.log('✅ Document carregado:', document.readyState);
        console.log('✅ Root element existe:', !!document.getElementById('root'));
        
        // Testa se o módulo main.jsx pode ser carregado
        const script = document.createElement('script');
        script.type = 'module';
        script.src = '/src/main.jsx';
        script.onerror = function() {
            console.error('❌ Erro ao carregar /src/main.jsx');
            document.getElementById('teste').innerHTML += '<p style="color: red;">❌ Erro ao carregar main.jsx - Verifique o console!</p>';
        };
        script.onload = function() {
            console.log('✅ main.jsx carregado com sucesso!');
            document.getElementById('teste').innerHTML += '<p style="color: green;">✅ main.jsx carregado!</p>';
        };
        document.body.appendChild(script);
    </script>
</body>
</html>
